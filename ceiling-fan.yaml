esphome:
  name: ceiling-fan
  friendly_name: ceiling_fan
  includes:
  libraries:
  on_boot:
    #priority: 200
    then:
      - lambda: "id(my_vesc_ptr) = id(my_vesc_hub);"
  platformio_options:
    build_flags:
      #- -DCONFIG_BT_NIMBLE_LOG_LEVEL=0       # This causes redefine errors
      #- -DCONFIG_NIMBLE_CPP_LOG_LEVEL=0      # 0 is the most verbose (DEBUG)
      #- -DCORE_DEBUG_LEVEL=4                 # Sets Arduino core debug to DEBUG level
      #- -DCONFIG_BT_NIMBLE_ROLE_PERIPHERAL=1 # Force enable peripheral role
      #- -DARDUINO_USB_CDC_ON_BOOT=1          # Helps if logs are trapped in the internal buffer
      #- -DARDUINO_USB_CDC_ON_BOOT=0
      - -DCONFIG_BT_ENABLED=1
      - -DCONFIG_BT_NIMBLE_ENABLED=1
      - -DCONFIG_BT_CONTROLLER_ENABLED=1
      #- -DCONFIG_BT_NIMBLE_HCI_UART_BAUD_RATE=115200
      #- -DCONFIG_BT_NIMBLE_MSYS1_BLOCK_COUNT=12 # Increase memory blocks
      #- -DCONFIG_BT_NIMBLE_PINNED_TO_CORE=0
      #- -DCONFIG_BT_NIMBLE_HCI_EVT_HI_BUF_COUNT=32
      #- -DCONFIG_BT_NIMBLE_HCI_EVT_LO_BUF_COUNT=8
      #- -DCONFIG_BT_NIMBLE_MSYS1_BLOCK_COUNT=16


esp32:
  board: lolin32_lite
  framework:
    type: arduino


logger:
  # Log levels (least → most noisy):
  # NONE → ERROR → WARN → INFO → DEBUG → VERBOSE → VERY_VERBOSE
  level: DEBUG
  logs:
    #vesc: DEBUG
    #ble_uart: DEBUG
    sensor: WARN
    number: WARN
    #esp32_ble: WARN
    #api.service: WARN
  baud_rate: 0 #disabled 
  #baud_rate: 115200

external_components:
  - source:
      type: local
      path: components
    components: [vesc_component, ble_uart_component]

# Sensors

sensor:
  - platform: vesc_component
    vesc_id: my_vesc_hub
    voltage:
      name: "Input Voltage"
      id: vesc_voltage
    rpm:
      name: "RPM"
      id: vesc_rpm
    duty_cycle:
      name: "Duty Cycle"
      id: vesc_duty_cycle
    input_current:
      name: "Input Current"
      id: vesc_input_current
    phase_current:
      name: "Phase Current"
      id: vesc_phase_current
    fet_temp:
      name: "FET Temperature"
      id: vesc_fet_temp
  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 60s

# Controls

number:
  - platform: vesc_component
    vesc_id: my_vesc_hub
    rpm_control:
      name: "Motor Target RPM"
      id: rpm_slider
      unit_of_measurement: "RPM"
      mode: SLIDER
    current_control:
      name: "Motor Target Current"
      id: current_slider
      unit_of_measurement: "A"
      mode: SLIDER
    duty_cycle_control:
      name: "Motor Target Duty Cycle"
      id: duty_cycle_slider
      unit_of_measurement: "%"
      mode: SLIDER

switch:
  - platform: template
    id: ble_bridge_enabled
    name: "BLE Bridge Enabled"
    icon: "mdi:bluetooth"
    restore_mode: RESTORE_DEFAULT_ON
    lambda: |-
      return id(my_ble_uart_component).is_enabled();
    turn_on_action:
      lambda: id(my_ble_uart_component).set_enabled(true);
    turn_off_action:
      lambda: id(my_ble_uart_component).set_enabled(false);

button:
  - platform: restart
    id: reboot
    name: "Reboot"

uart:
  id: esp_uart
  tx_pin: GPIO17
  rx_pin: GPIO16
  baud_rate: 115200
#debug:
#  direction: BOTH
#  dummy_receiver: false

# Optional debug UART (uncomment if you want a separate debug port)
# uart:
#   - id: debug_uart
#     tx_pin: 1
#     rx_pin: 3
#     baud_rate: 115200

vesc_component:
  id: my_vesc_hub
  update_interval: 2s
  uart: esp_uart
  ble_uart_component_id: my_ble_uart_component
  #debug_port: debug_uart

# Define the global variable to store our custom component instance
globals:
  - id: my_vesc_ptr
    # Use the full namespace and the class name
    type: esphome::vesc_component::VescComponent*
    initial_value: "nullptr"

ble_uart_component:
  id: my_ble_uart_component
  uart_id: esp_uart # share the VESC UART bus
  device_name: "Ceiling Fan" # advertised name

# Home Assistant API
api:
  encryption:
    key: "+yVKF7n3gKxupWNXsMz05HtMTbSaohGJO+usOoCLyLQ="

ota:
  - platform: esphome
    password: "67ea0784bdf4766ea7f020ff7939d8c1"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:

captive_portal:
