esphome:
  name: currentflow
  friendly_name: CurrentFlow
  includes:
  libraries:
    # - ESP32 BLE Arduino
  # This line saves the pointer to the global variable
  on_boot:
    priority: 800
    then:
      - lambda: "id(my_vesc_ptr) = id(my_vesc_hub);"

esp32:
  board: lolin32_lite
  framework:
    type: arduino

esp32_ble:
esp32_ble_tracker: # the linker will fail if this is missing, even if you don't use it directly, because the BLE library depends on it

# Enable logging
logger:
  level: DEBUG
  #level: INFO
  #level: ERROR
  baud_rate: 0

external_components:
  - source:
      type: local
      path: components
    components: [vesc_component, ble_uart_component]

# Sensors
sensor:
  - platform: vesc_component
    vesc_id: my_vesc_hub
    voltage:
      name: "Input Voltage"
      id: vesc_voltage
    rpm:
      name: "RPM"
      id: vesc_rpm
    duty_cycle:
      name: "Duty Cycle"
      id: vesc_duty_cycle
    input_current:
      name: "Input Current"
      id: vesc_input_current
    phase_current:
      name: "Phase Current"
      id: vesc_phase_current
    fet_temp:
      name: "FET Temperature"
      id: vesc_fet_temp
    uart_activity:
      name: "UART Activity"
      id: vesc_uart_activity
  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 60s

# Controls
number:
  - platform: vesc_component
    vesc_id: my_vesc_hub
    rpm_control:
      name: "Motor Target RPM"
      id: rpm_slider
      unit_of_measurement: "RPM"
      mode: SLIDER
    current_control:
      name: "Motor Target Current"
      id: current_slider
      unit_of_measurement: "A"
      mode: SLIDER
    duty_cycle_control:
      name: "Motor Target Duty Cycle"
      id: duty_cycle_slider
      unit_of_measurement: "%"
      mode: SLIDER

uart:
  id: esp_uart
  tx_pin: GPIO17
  rx_pin: GPIO16
  baud_rate: 115200
#debug:
#  direction: BOTH
#  dummy_receiver: false

# Optional debug UART (uncomment if you want a separate debug port)
# uart:
#   - id: debug_uart
#     tx_pin: 1
#     rx_pin: 3
#     baud_rate: 115200

vesc_component:
  id: my_vesc_hub
  update_interval: 2s
  uart: esp_uart
  ble_uart_component_id: my_ble_uart_component
  # Optional: debug serial port (must be a UARTComponent id)
  # debug_port: debug_uart

# Define the global variable to store our custom component instance
globals:
  - id: my_vesc_ptr
    # Use the full namespace and the class name
    type: esphome::vesc_component::VescComponent*
    initial_value: "nullptr"

ble_uart_component:
  id: my_ble_uart_component
  uart_id: esp_uart # share the VESC UART bus
  device_name: "CurrentFlow VESC" # what shows up in VESC Tool's BLE scan

# Enable Home Assistant API
api:
  encryption:
    key: "lpiziqdo+n6prnDBMwJ3xSkkLt72SVo4Jm6SpN44Fk4="

ota:
  - platform: esphome
    password: "fcc33d73998e4d8de17375f573d81058"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Currentflow Fallback Hotspot"
    password: "3dxo7P20uWMf"

captive_portal:
